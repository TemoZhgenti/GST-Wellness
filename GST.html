<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Elite Medical Travel</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>
* {
    box-sizing: border-box;}

body {
    margin: 0;
    height: 100vh;
    font-family: 'Inter', sans-serif;
    color: #fff;
    overflow: hidden;
}

/* VIDEO BACKGROUND */
.video-bg {
    position: fixed;
    inset: 0;
    z-index: -2;
    overflow: hidden;
}

.video-bg video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    filter: brightness(0.35);
}

/* DARK OVERLAY */
.video-overlay {
    position: fixed;
    inset: 0;
    background: radial-gradient(circle at top, #1b1b1b, #000);
    opacity: 0.7;
    z-index: -1;
}

/* LANGUAGE SWITCHER */
.lang-switcher {
    position: absolute;
    top: 25px;
    right: 40px;
    display: flex;
    gap: 15px;
    z-index: 10;
}

.lang-switcher button {
    background: transparent;
    border: none;
    color: #ffd700;
    font-size: 13px;
    letter-spacing: 1px;
    cursor: pointer;
    opacity: 0.7;
    transition: opacity 0.3s ease;
}

.lang-switcher button:hover,
.lang-switcher button.active {
    opacity: 1;
}

/* CONTENT */
.container {
    max-width: 900px;
    width: 90%;
    height: 100vh;
    margin: auto;
    display: flex;
    flex-direction: column;
    justify-content: center;
    text-align: center;
}

h1 {
    font-family: 'Playfair Display', serif;
    font-size: 42px;
    margin-bottom: 15px;
}

.subtitle {
    font-size: 16px;
    opacity: 0.85;
    margin-bottom: 60px;
}

.cards {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 30px;
}

.card {
    position: relative;
    height: 300px;
    border-radius: 20px;
    overflow: hidden;
    cursor: pointer;
    border: 1px solid rgba(255,215,0,0.25);
    background: linear-gradient(145deg, rgba(255,255,255,0.08), rgba(255,255,255,0.02));
    transition: transform 0.4s ease, box-shadow 0.4s ease;
}

.card:hover {
    transform: translateY(-10px) scale(1.02);
    box-shadow: 0 25px 60px rgba(255,215,0,0.18);
}

.card::after {
    content: "";
    position: absolute;
    inset: 0;
    background-size: cover;
    background-position: center;
    opacity: 0;
    transition: opacity 0.5s ease;
}

.card::before {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(to bottom, rgba(0,0,0,0.3), rgba(0,0,0,0.7));
    opacity: 0;
    transition: opacity 0.5s ease;
    z-index: 1;
}

.card:hover::after,
.card:hover::before {
    opacity: 1;
}

.card-content {
    position: relative;
    z-index: 2;
    height: 100%;
    padding: 35px;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
}

.card h2 {
    font-family: 'Playfair Display', serif;
    color: #ffd700;
    font-size: 26px;
    margin-bottom: 10px;
}

.card p {
    font-size: 15px;
    line-height: 1.6;
}

.treatment::after {
    background-image: url("images/auzi.jpeg");
}

.consultation::after {
    background-image: url("images/tooth-cleaning-925x425.jpg");
}

.footer {
    margin-top: 50px;
    font-size: 12px;
    opacity: 0.6;
    letter-spacing: 2px;
}
</style>
</head>

<body>

<!-- VIDEO BACKGROUND -->
<div class="video-bg">
    <video autoplay muted loop playsinline>
        <source src="videos/VIDEO-2026-02-05-02-07-16.mp4" type="video/mp4">
    </video>
</div>
<div class="video-overlay"></div>

<!-- LANGUAGE SWITCHER -->
<div class="lang-switcher">
    <button onclick="setLang('en')" class="active">EN</button>
    <button onclick="setLang('de')">DE</button>
    <button onclick="setLang('ru')">RU</button>
</div>

<div class="container">
    <h1 id="title">Your Health. Our Expertise.</h1>
    <div class="subtitle" id="subtitle">
        Choose how you would like to begin your medical journey
    </div>

    <div class="cards">
        <style>
.card-link:.card-link:link,
.card-link:visited,
.card-link:hover,
.card-link:active  {
  text-decoration: none;
  color: inherit;
  display: block;
}
</style>

<a href="https://tskaltuboresort.ge/eng" target="_blank" class="card-link">
  <div class="card treatment">
    <div class="card-content">
      <h2>Medical Treatment Abroad</h2>
      <p>Premium clinics, world-class doctors, complete concierge care.</p>
    </div>
  </div>
</a>
        <div class="card consultation" onclick="openPage('https://www.facebook.com/p/Dental-Lux-დენტალ-ლუქსი-100078427375089/?locale=ka_GE')">
            <div class="card-content">
                <h2 id="card2-title">Private Online Consultation</h2>
                <p id="card2-text">Discreet video consultations with leading specialists.</p>
            </div>
        </div>
    </div>

    <div class="footer">ELITE MEDICAL TRAVEL</div>
</div>

<script>
const translations = {
    en: {
        title: "Your Health. Our Expertise.",
        subtitle: "Choose how you would like to begin your medical journey",
        c1t: "Medical Treatment Abroad",
        c1p: "Premium clinics, world-class doctors, complete concierge care.",
        c2t: "Private Online Consultation",
        c2p: "Discreet video consultations with leading specialists."
    },
    de: {
        title: "Ihre Gesundheit. Unsere Expertise.",
        subtitle: "Wählen Sie, wie Sie Ihre medizinische Reise beginnen möchten",
        c1t: "Medizinische Behandlung im Ausland",
        c1p: "Premium-Kliniken, erstklassige Ärzte, kompletter Concierge-Service.",
        c2t: "Private Online-Beratung",
        c2p: "Diskrete Video-Beratungen mit führenden Spezialisten."
    },
    ru: {
        title: "Ваше здоровье. Наша экспертиза.",
        subtitle: "Выберите, с чего начать ваш медицинский путь",
        c1t: "Лечение за рубежом",
        c1p: "Премиальные клиники, врачи мирового уровня, полный сервис.",
        c2t: "Онлайн консультация",
        c2p: "Конфиденциальные видео-консультации с ведущими специалистами."
    }
};

function setLang(lang) {
    document.getElementById("title").innerText = translations[lang].title;
    document.getElementById("subtitle").innerText = translations[lang].subtitle;
    document.getElementById("card1-title").innerText = translations[lang].c1t;
    document.getElementById("card1-text").innerText = translations[lang].c1p;
    document.getElementById("card2-title").innerText = translations[lang].c2t;
    document.getElementById("card2-text").innerText = translations[lang].c2p;

    document.querySelectorAll(".lang-switcher button").forEach(b => b.classList.remove("active"));
    event.target.classList.add("active");
}

function openPage(page) {
    window.open(page, "_blank");
}
</script>

</body>
</html>
